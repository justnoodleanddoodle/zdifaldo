name: ZDiFaldo Haber Botu

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  haber-guncelle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repoyu cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Bagimliliklari yukle
        run: pip install -r requirements.txt

      - name: Haberleri cek ve cevir
        run: python fetch_news.py

      - name: Commit ve push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news_data.json
          git diff --cached --quiet && echo "Degisiklik yok." && exit 0
          git commit -m "chore: haberler guncellendi"
          git push
