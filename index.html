<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZDiFaldo – Design Nachrichten</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const CATEGORY_COLORS = {
  ui:       { bg: "bg-blue-950",   text: "text-blue-300",   border: "border-blue-800",   dot: "bg-blue-400"   },
  tools:    { bg: "bg-green-950",  text: "text-green-300",  border: "border-green-800",  dot: "bg-green-400"  },
  ai:       { bg: "bg-violet-950", text: "text-violet-300", border: "border-violet-800", dot: "bg-violet-400" },
  branding: { bg: "bg-orange-950", text: "text-orange-300", border: "border-orange-800", dot: "bg-orange-400" },
  motion:   { bg: "bg-pink-950",   text: "text-pink-300",   border: "border-pink-800",   dot: "bg-pink-400"   },
  general:  { bg: "bg-zinc-900",   text: "text-zinc-400",   border: "border-zinc-700",   dot: "bg-zinc-400"   },
};

function CategoryBadge({ category, label }) {
  const c = CATEGORY_COLORS[category] || CATEGORY_COLORS.general;
  return (
    <span className={`inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium border ${c.bg} ${c.text} ${c.border}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>
      {label}
    </span>
  );
}

function NewsCard({ item, labels }) {
  const label = labels[item.category] || item.category;
  const pubDate = item.published_raw
    ? new Date(item.published_raw).toLocaleDateString("de-DE", { day: "2-digit", month: "short", year: "numeric" })
    : "";

  return (
    <article className="flex flex-col bg-zinc-900 border border-zinc-800 rounded-2xl p-5 hover:border-zinc-600 transition-colors duration-200 group">
      <div className="flex items-start justify-between gap-3 mb-3">
        <CategoryBadge category={item.category} label={label} />
        {pubDate && <span className="text-xs text-zinc-600 shrink-0 mt-0.5">{pubDate}</span>}
      </div>

      <h2 className="text-sm font-semibold text-zinc-100 leading-snug mb-2 group-hover:text-white transition-colors">
        {item.title_de || item.title}
      </h2>

      {(item.summary_de || item.summary_original) && (
        <p className="text-xs text-zinc-400 leading-relaxed line-clamp-3 mb-4 flex-1">
          {item.summary_de || item.summary_original}
        </p>
      )}

      <div className="flex items-center justify-between mt-auto pt-3 border-t border-zinc-800">
        <span className="text-xs text-zinc-600">{item.source}</span>
        {item.url && (
          <a
            href={item.url}
            target="_blank"
            rel="noopener noreferrer"
            className="text-xs text-zinc-400 hover:text-zinc-100 flex items-center gap-1 transition-colors"
          >
            Lesen
            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
          </a>
        )}
      </div>
    </article>
  );
}

function App() {
  const [data, setData]       = useState(null);
  const [error, setError]     = useState(null);
  const [activecat, setActivecat] = useState("all");
  const [search, setSearch]   = useState("");

  useEffect(() => {
    fetch("./news_data.json")
      .then(r => { if (!r.ok) throw new Error("news_data.json bulunamadı"); return r.json(); })
      .then(setData)
      .catch(e => setError(e.message));
  }, []);

  const categories = useMemo(() => {
    if (!data) return [];
    const seen = new Set();
    data.items.forEach(i => seen.add(i.category));
    return Array.from(seen);
  }, [data]);

  const filtered = useMemo(() => {
    if (!data) return [];
    return data.items.filter(item => {
      const matchCat  = activecat === "all" || item.category === activecat;
      const q         = search.toLowerCase();
      const matchSearch = !q ||
        (item.title_de || item.title || "").toLowerCase().includes(q) ||
        (item.summary_de || item.summary_original || "").toLowerCase().includes(q) ||
        (item.source || "").toLowerCase().includes(q);
      return matchCat && matchSearch;
    });
  }, [data, activecat, search]);

  const updatedAt = data?.updated_at
    ? new Date(data.updated_at).toLocaleString("de-DE", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" })
    : "";

  return (
    <div className="max-w-6xl mx-auto px-4 py-10">
      {/* Header */}
      <header className="mb-8">
        <div className="flex items-end justify-between flex-wrap gap-4 mb-6">
          <div>
            <h1 className="text-3xl font-semibold tracking-tight text-white">ZDiFaldo</h1>
            <p className="text-sm text-zinc-500 mt-1">Design & Technologie Nachrichten auf Deutsch</p>
          </div>
          {updatedAt && (
            <span className="text-xs text-zinc-600 border border-zinc-800 rounded-lg px-3 py-1.5">
              Aktualisiert: {updatedAt}
            </span>
          )}
        </div>

        {/* Arama */}
        <div className="relative mb-4">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
          </svg>
          <input
            type="text"
            placeholder="Nachrichten durchsuchen..."
            value={search}
            onChange={e => setSearch(e.target.value)}
            className="w-full bg-zinc-900 border border-zinc-800 rounded-xl pl-9 pr-4 py-2.5 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-zinc-600 transition-colors"
          />
        </div>

        {/* Kategori filtreleri */}
        <div className="flex flex-wrap gap-2">
          <button
            onClick={() => setActivecat("all")}
            className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors border ${
              activecat === "all"
                ? "bg-zinc-100 text-zinc-900 border-zinc-100"
                : "bg-transparent text-zinc-400 border-zinc-800 hover:border-zinc-600 hover:text-zinc-200"
            }`}
          >
            Alle
          </button>
          {categories.map(cat => {
            const label = data?.category_labels?.[cat] || cat;
            const c = CATEGORY_COLORS[cat] || CATEGORY_COLORS.general;
            return (
              <button
                key={cat}
                onClick={() => setActivecat(cat)}
                className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors border ${
                  activecat === cat
                    ? `${c.bg} ${c.text} ${c.border}`
                    : "bg-transparent text-zinc-400 border-zinc-800 hover:border-zinc-600 hover:text-zinc-200"
                }`}
              >
                {label}
              </button>
            );
          })}
        </div>
      </header>

      {/* Durum mesajları */}
      {error && (
        <div className="text-center py-20 text-zinc-500">
          <div className="text-4xl mb-3">⚠️</div>
          <p className="text-sm">{error}</p>
          <p className="text-xs text-zinc-700 mt-2">Stelle sicher, dass news_data.json vorhanden ist.</p>
        </div>
      )}

      {!data && !error && (
        <div className="text-center py-20 text-zinc-600 text-sm animate-pulse">
          Nachrichten werden geladen...
        </div>
      )}

      {/* Haber grid */}
      {filtered.length > 0 && (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          {filtered.map(item => (
            <NewsCard key={item.id} item={item} labels={data?.category_labels || {}} />
          ))}
        </div>
      )}

      {data && filtered.length === 0 && (
        <div className="text-center py-20 text-zinc-600 text-sm">
          Keine Ergebnisse gefunden.
        </div>
      )}

      {/* Footer */}
      {data && (
        <footer className="mt-12 pt-6 border-t border-zinc-900 flex items-center justify-between flex-wrap gap-2 text-xs text-zinc-700">
          <span>{data.item_count} Artikel aus {data.source_count} Quellen</span>
          <span>ZDiFaldo – täglich aktualisiert via GitHub Actions</span>
        </footer>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
