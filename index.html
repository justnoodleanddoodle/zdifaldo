<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZDiFaldo // Creative Tech & Design Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .modal-overlay { animation: fadeIn 0.15s ease; }
    .modal-panel { animation: slideUp 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .prose p { margin-bottom: 1rem; line-height: 1.75; }
    .prose h2 { font-size: 1.25rem; font-weight: 700; margin: 1.5rem 0 0.5rem; }
    .prose h3 { font-size: 1.1rem; font-weight: 600; margin: 1.25rem 0 0.5rem; }
    .prose ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
    .prose li { margin-bottom: 0.25rem; line-height: 1.7; }
    .prose a { color: #2563eb; text-decoration: underline; }
    .prose blockquote { border-left: 3px solid #e4e4e7; padding-left: 1rem; color: #71717a; margin: 1rem 0; }
  </style>
</head>
<body class="bg-white text-zinc-900 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const FILTER_LABELS = {
  all:      "Alle",
  motion:   "Motion & Plugins",
  branding: "Branding & Typo",
  ai:       "KI & Bildrechte",
  tools:    "Software & Tools",
  ui:       "UI/UX",
  general:  "Design",
};

const FALLBACK_IMAGES = {
  ui:       "https://images.unsplash.com/photo-1561070791-2526d30994b5?w=600&q=80",
  tools:    "https://images.unsplash.com/photo-1618788372246-79faff0c3742?w=600&q=80",
  ai:       "https://images.unsplash.com/photo-1677442135703-1787eea5ce01?w=600&q=80",
  branding: "https://images.unsplash.com/photo-1634084462412-b54873c0a56d?w=600&q=80",
  motion:   "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600&q=80",
  general:  "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&q=80",
};

function formatDate(raw) {
  if (!raw) return "Heute";
  try {
    const d = new Date(raw);
    const diff = Math.floor((new Date() - d) / 86400000);
    if (diff === 0) return "Heute";
    if (diff === 1) return "Gestern";
    if (diff < 7) return `vor ${diff} Tagen`;
    return d.toLocaleDateString("de-DE", { day: "2-digit", month: "short", year: "numeric" });
  } catch { return "Heute"; }
}

// Claude API ile makale içeriği çek ve Almancaya çevir
async function fetchArticleContent(url, title) {
  const prompt = `Besuche diese URL und extrahiere den vollständigen Artikeltext: ${url}

Dann übersetze den gesamten Artikel ins Deutsche. 

Antworte NUR mit diesem JSON (kein weiterer Text, keine Backticks):
{
  "content_de": "Vollständiger Artikeltext auf Deutsch als HTML. Nutze <p>, <h2>, <h3>, <ul>, <li>, <blockquote> Tags für Formatierung."
}

Falls die Seite nicht erreichbar ist, schreibe eine 3-4 Absatz lange Zusammenfassung des Themas auf Deutsch basierend auf dem Titel: "${title}"`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: prompt }]
    })
  });

  const data = await response.json();
  const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
  const clean = text.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("{");
  const end = clean.lastIndexOf("}") + 1;
  const parsed = JSON.parse(clean.slice(start, end));
  return parsed.content_de;
}

// Modal bileşeni
function ArticleModal({ item, onClose }) {
  const [content, setContent] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const imgSrc = item.image || FALLBACK_IMAGES[item.category] || FALLBACK_IMAGES.general;

  useEffect(() => {
    document.body.style.overflow = "hidden";
    fetchArticleContent(item.url, item.title_de || item.title)
      .then(c => { setContent(c); setLoading(false); })
      .catch(() => { setError(true); setLoading(false); });
    return () => { document.body.style.overflow = ""; };
  }, []);

  // ESC ile kapat
  useEffect(() => {
    const handler = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  return (
    <div className="modal-overlay fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4"
         style={{ background: "rgba(0,0,0,0.5)" }}
         onClick={e => { if (e.target === e.currentTarget) onClose(); }}>

      <div className="modal-panel bg-white w-full sm:max-w-3xl sm:rounded-2xl max-h-screen sm:max-h-[90vh] flex flex-col overflow-hidden shadow-2xl">

        {/* Kapak görseli */}
        <div className="relative h-52 shrink-0 overflow-hidden">
          <img src={imgSrc} alt={item.title_de || item.title}
               style={{ width:"100%", height:"100%", objectFit:"cover" }}
               onError={e => { e.target.src = FALLBACK_IMAGES.general; }} />
          <div style={{ background:"linear-gradient(to top, rgba(0,0,0,0.6), transparent)" }}
               className="absolute inset-0" />
          <button onClick={onClose}
                  className="absolute top-4 right-4 bg-white bg-opacity-90 hover:bg-opacity-100 rounded-full w-9 h-9 flex items-center justify-center text-zinc-700 transition-all shadow">
            ✕
          </button>
        </div>

        {/* İçerik */}
        <div className="overflow-y-auto flex-1 p-6 sm:p-8">
          {/* Başlık */}
          <div className="mb-1">
            <span className="bg-zinc-900 text-white text-xs font-bold px-2.5 py-1 rounded">
              {(item.category || "design").toUpperCase()}
            </span>
          </div>
          <h1 className="text-2xl font-black leading-tight mt-3 mb-2">
            {item.title_de || item.title}
          </h1>
          <div className="flex items-center gap-2 text-sm text-zinc-500 mb-6">
            <span>{item.source}</span>
            <span>•</span>
            <span>{formatDate(item.published_raw)}</span>
          </div>

          {/* Makale içeriği */}
          {loading && (
            <div className="space-y-3 animate-pulse">
              {[...Array(6)].map((_, i) => (
                <div key={i} className={`h-4 bg-zinc-100 rounded ${i === 2 ? "w-3/4" : "w-full"}`} />
              ))}
              <p className="text-sm text-zinc-400 text-center pt-4">
                Artikel wird übersetzt...
              </p>
            </div>
          )}

          {error && (
            <div className="text-center py-8 text-zinc-400">
              <p className="text-3xl mb-2">⚠️</p>
              <p className="text-sm">Artikel konnte nicht geladen werden.</p>
            </div>
          )}

          {content && !loading && (
            <div className="prose text-sm text-zinc-700"
                 dangerouslySetInnerHTML={{ __html: content }} />
          )}
        </div>

        {/* Footer — kaynak linki */}
        <div className="shrink-0 border-t border-zinc-200 px-6 sm:px-8 py-4 flex items-center justify-between bg-zinc-50">
          <span className="text-xs text-zinc-500">Quelle: {item.source}</span>
          <a href={item.url} target="_blank" rel="noopener noreferrer"
             className="flex items-center gap-1.5 text-sm font-semibold text-zinc-900 border-2 border-zinc-900 px-4 py-1.5 rounded-lg hover:bg-zinc-900 hover:text-white transition-colors">
            Original lesen
            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
          </a>
        </div>
      </div>
    </div>
  );
}

function NewsCard({ item, onOpen }) {
  const label = FILTER_LABELS[item.category] || item.category;
  const imgSrc = item.image || FALLBACK_IMAGES[item.category] || FALLBACK_IMAGES.general;
  const date = formatDate(item.published_raw);

  return (
    <article className="flex gap-6 py-10 border-b border-zinc-200 last:border-0">
      <button onClick={() => onOpen(item)}
              className="shrink-0 w-52 h-36 rounded-xl overflow-hidden bg-zinc-100 block cursor-pointer">
        <img src={imgSrc} alt={item.title_de || item.title}
             style={{ width:"100%", height:"100%", objectFit:"cover" }}
             onError={e => { e.target.src = FALLBACK_IMAGES.general; }} />
      </button>

      <div className="flex flex-col justify-between flex-1 min-w-0">
        <div>
          <button onClick={() => onOpen(item)} className="text-left w-full">
            <h2 className="text-2xl font-black leading-tight mb-3 hover:text-zinc-500 transition-colors line-clamp-2">
              {item.title_de || item.title}
            </h2>
          </button>

          <div className="flex items-center gap-2 mb-3 flex-wrap">
            <span className="bg-zinc-900 text-white text-xs font-bold px-2.5 py-1 rounded">
              {(item.category || "").toUpperCase()}
            </span>
            <span className="text-zinc-300">•</span>
            <span className="text-sm text-zinc-500">{item.source}</span>
            <span className="text-zinc-300">•</span>
            <span className="text-sm text-zinc-500">{date}</span>
          </div>

          {(item.summary_de || item.summary_original) && (
            <p className="text-sm text-zinc-600 leading-relaxed line-clamp-3">
              {item.summary_de || item.summary_original}
            </p>
          )}
        </div>

        <div className="mt-4">
          <button onClick={() => onOpen(item)}
                  className="inline-block border-2 border-zinc-900 text-zinc-900 text-sm font-semibold px-5 py-2 rounded-lg hover:bg-zinc-900 hover:text-white transition-colors">
            Weiterlesen
          </button>
        </div>
      </div>
    </article>
  );
}

function App() {
  const [data, setData]         = useState(null);
  const [error, setError]       = useState(null);
  const [activecat, setAct]     = useState("all");
  const [search, setSearch]     = useState("");
  const [selected, setSelected] = useState(null);

  useEffect(() => {
    fetch("./news_data.json")
      .then(r => { if (!r.ok) throw new Error("news_data.json nicht gefunden"); return r.json(); })
      .then(setData)
      .catch(e => setError(e.message));
  }, []);

  const filtered = useMemo(() => {
    if (!data) return [];
    return data.items.filter(item => {
      const matchCat = activecat === "all" || item.category === activecat;
      const q = search.toLowerCase();
      const matchSearch = !q ||
        (item.title_de || item.title || "").toLowerCase().includes(q) ||
        (item.summary_de || item.summary_original || "").toLowerCase().includes(q) ||
        (item.source || "").toLowerCase().includes(q);
      return matchCat && matchSearch;
    });
  }, [data, activecat, search]);

  return (
    <div className="max-w-4xl mx-auto px-6 py-12">
      <header className="mb-10">
        <div className="flex items-start justify-between mb-2 flex-wrap gap-4">
          <div>
            <h1 className="text-5xl font-black tracking-tight">ZDiFaldo</h1>
            <p className="text-zinc-500 text-sm mt-1">Spotlight: Motion, Branding, KI-Recht & Software-Tools</p>
          </div>
          <span className="border border-zinc-300 rounded-full px-4 py-1.5 text-sm text-zinc-500 self-start mt-2">
            Live-Feed für dein Design-Team
          </span>
        </div>

        <div className="relative my-5">
          <input type="text" placeholder="Nachrichten durchsuchen..."
                 value={search} onChange={e => setSearch(e.target.value)}
                 className="w-full border border-zinc-200 rounded-xl pl-4 pr-4 py-2.5 text-sm focus:outline-none focus:border-zinc-400 transition-colors bg-zinc-50" />
        </div>

        <div className="flex flex-wrap gap-2 pb-6 border-b border-zinc-200">
          {Object.entries(FILTER_LABELS).map(([cat, label]) => (
            <button key={cat} onClick={() => setAct(cat)}
                    className={`px-4 py-1.5 rounded-full text-sm font-medium transition-colors border ${
                      activecat === cat
                        ? "bg-zinc-900 text-white border-zinc-900"
                        : "bg-white text-zinc-600 border-zinc-300 hover:border-zinc-500 hover:text-zinc-900"
                    }`}>
              {label}
            </button>
          ))}
        </div>
      </header>

      {error && <div className="text-center py-24 text-zinc-400 text-sm">{error}</div>}
      {!data && !error && <div className="text-center py-24 text-zinc-400 text-sm animate-pulse">Nachrichten werden geladen...</div>}

      {filtered.length > 0 && (
        <div>
          {filtered.map(item => (
            <NewsCard key={item.id} item={item} onOpen={setSelected} />
          ))}
        </div>
      )}

      {data && filtered.length === 0 && (
        <div className="text-center py-24 text-zinc-400 text-sm">Keine Ergebnisse gefunden.</div>
      )}

      {data?.updated_at && (
        <footer className="mt-12 pt-6 border-t border-zinc-200 flex items-center justify-between flex-wrap gap-2 text-xs text-zinc-400">
          <span>{data.item_count} Artikel · {data.source_count} Quellen</span>
          <span>Zuletzt aktualisiert: {new Date(data.updated_at).toLocaleString("de-DE", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" })}</span>
        </footer>
      )}

      {selected && <ArticleModal item={selected} onClose={() => setSelected(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
